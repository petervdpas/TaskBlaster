name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  checks: write

env:
  APP_NAME: TaskBlaster
  CONFIGURATION: Release
  PROJECT_PATH: ./TaskBlaster/TaskBlaster.csproj
  DEB_PKG_NAME: taskblaster

jobs:
  # ==================================================================
  # Gate: tests must pass before any platform build runs.
  # ==================================================================
  test:
    name: Test (gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore TaskBlaster.slnx

      - name: Build
        run: dotnet build TaskBlaster.slnx --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test TaskBlaster.Tests/TaskBlaster.Tests.csproj
          --configuration Release --no-build
          --
          --report-xunit-trx
          --report-xunit-trx-filename test-results.trx
          --results-directory ${{ github.workspace }}/TestResults

      - name: Dump test output on failure
        if: failure()
        shell: bash
        run: |
          echo "=== TestResults directory tree ==="
          find "${GITHUB_WORKSPACE}" -path '*TestResults*' -type f 2>/dev/null | sort
          echo
          echo "=== Contents of every TestResults .log ==="
          for f in $(find "${GITHUB_WORKSPACE}" -path '*TestResults*' -name '*.log' 2>/dev/null); do
            echo "--- $f ---"; cat "$f" || true; echo
          done

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            TestResults/**/*.trx
            TestResults/**/*.log
          if-no-files-found: warn

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: xUnit Tests
          path: TestResults/**/*.trx
          reporter: dotnet-trx
          fail-on-error: false

  # ==================================================================
  # Platform binaries (self-contained publish) + lightweight packaging:
  #   - Windows .zip (portable)
  #   - Linux / macOS .tar.gz
  # ==================================================================
  build:
    name: Build (${{ matrix.name }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            rid: win-x64
          - name: linux-x64
            os: ubuntu-latest
            rid: linux-x64
          - name: linux-arm64
            os: ubuntu-latest
            rid: linux-arm64
          - name: macos-x64
            os: macos-latest
            rid: osx-x64
          - name: macos-arm64
            os: macos-latest
            rid: osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        shell: bash
        run: dotnet restore "$PROJECT_PATH"

      - name: Publish
        shell: bash
        run: |
          set -euo pipefail
          VER="${GITHUB_REF_NAME#v}"
          if [ -z "$VER" ] || [ "$VER" = "${GITHUB_REF_NAME}" ]; then
            VER="0.0.0-dev"
          fi
          dotnet publish "$PROJECT_PATH" \
            -c "$CONFIGURATION" \
            -r "${{ matrix.rid }}" \
            --self-contained true \
            -p:PublishSingleFile=false \
            -p:Version="$VER" \
            -o "out/${{ matrix.name }}"

      # --- Windows portable zip + Inno Setup installer -----------------
      - name: Install Inno Setup
        if: matrix.os == 'windows-latest'
        run: choco install innosetup -y

      - name: Build Windows installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v', ''
          iscc /DAppVersion=$ver installer/windows/TaskBlaster.iss

      - name: Package (Windows zip)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path "out\${{ matrix.name }}\*" -DestinationPath "${{ env.APP_NAME }}-${{ matrix.name }}.zip"

      # --- macOS .app bundle + .dmg -----------------------------------
      - name: Build macOS .app bundle + .dmg
        if: startsWith(matrix.rid, 'osx')
        shell: bash
        run: |
          set -euo pipefail
          VER="${GITHUB_REF_NAME#v}"; [ "$VER" = "${GITHUB_REF_NAME}" ] && VER="0.0.0-dev"

          APP="${APP_NAME}.app"
          BUNDLE="bundles/${APP}"
          mkdir -p "$BUNDLE/Contents/MacOS" "$BUNDLE/Contents/Resources"

          # Payload
          cp -a "out/${{ matrix.name }}/." "$BUNDLE/Contents/MacOS/"
          chmod +x "$BUNDLE/Contents/MacOS/${APP_NAME}" || true

          # Icon (.icns) — convert the shipped .png via sips + iconutil (mac built-ins)
          ICONSET="${APP_NAME}.iconset"
          mkdir -p "$ICONSET"
          SRC="TaskBlaster/Images/taskblaster.png"
          for s in 16 32 64 128 256 512; do
            sips -z $s $s "$SRC" --out "$ICONSET/icon_${s}x${s}.png" >/dev/null
            sips -z $((s*2)) $((s*2)) "$SRC" --out "$ICONSET/icon_${s}x${s}@2x.png" >/dev/null
          done
          iconutil -c icns "$ICONSET" -o "$BUNDLE/Contents/Resources/${APP_NAME}.icns"

          # Info.plist
          cat > "$BUNDLE/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>${APP_NAME}</string>
            <key>CFBundleDisplayName</key><string>${APP_NAME}</string>
            <key>CFBundleIdentifier</key><string>com.petervdpas.taskblaster</string>
            <key>CFBundleVersion</key><string>${VER}</string>
            <key>CFBundleShortVersionString</key><string>${VER}</string>
            <key>CFBundleExecutable</key><string>${APP_NAME}</string>
            <key>CFBundleIconFile</key><string>${APP_NAME}.icns</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST

          # Build a plain .dmg from the bundle folder
          hdiutil create -volname "${APP_NAME}" -srcfolder bundles \
            -ov -format UDZO "${APP_NAME}-${{ matrix.name }}.dmg"

      # --- Linux/macOS tarball (portable) -----------------------------
      - name: Package (Linux/macOS tar.gz)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          cd "out/${{ matrix.name }}"
          tar -czf "../../${APP_NAME}-${{ matrix.name }}.tar.gz" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.name }}
          path: |
            ${{ env.APP_NAME }}-${{ matrix.name }}.zip
            ${{ env.APP_NAME }}-${{ matrix.name }}.tar.gz
            ${{ env.APP_NAME }}-${{ matrix.name }}.dmg
            installer/windows/output/*.exe
          if-no-files-found: ignore

  # ==================================================================
  # Fedora RPM (x86_64) — runs inside a Fedora container
  # ==================================================================
  rpm_fedora:
    name: Fedora RPM (Fedora ${{ matrix.fedora }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fedora: [43]
    container:
      image: fedora:${{ matrix.fedora }}

    steps:
      - name: Install build tooling
        shell: bash
        run: |
          set -euo pipefail
          dnf -y update
          dnf -y install ca-certificates git rpm-build rpmdevtools tar gzip findutils sed grep coreutils fontconfig freetype libX11 mesa-libGL
          update-ca-trust || true
          dnf -y install dotnet-sdk-10.0

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore
        shell: bash
        run: dotnet restore TaskBlaster.slnx

      - name: Publish linux-x64 self-contained
        shell: bash
        run: |
          set -euo pipefail
          VER="${GITHUB_REF_NAME#v}"; [ "$VER" = "${GITHUB_REF_NAME}" ] && VER="0.0.0-dev"
          dotnet publish "$PROJECT_PATH" \
            -c "$CONFIGURATION" -r linux-x64 \
            --self-contained true -p:PublishSingleFile=false \
            -p:Version="$VER" -o out/linux-x64

      - name: Prepare RPM sources
        shell: bash
        run: |
          set -euo pipefail
          VER="${GITHUB_REF_NAME#v}"; [ "$VER" = "${GITHUB_REF_NAME}" ] && VER="0.0.0-dev"
          RPMTOP="/github/home/rpmbuild"
          mkdir -p "$RPMTOP"
          rpmdev-setuptree

          cp -a packaging/fedora/taskblaster.spec "$RPMTOP/SPECS/taskblaster.spec"
          sed -i -E "s/^Version:[[:space:]]*.*/Version:        ${VER}/" "$RPMTOP/SPECS/taskblaster.spec"

          NAME="taskblaster"
          PKGROOT="${NAME}-${VER}"
          TARBALL="${NAME}-${VER}.tar.gz"

          STAGE="$(mktemp -d)"
          mkdir -p "$STAGE/$PKGROOT/payload" "$STAGE/$PKGROOT/packaging/fedora/icons"
          cp -a out/linux-x64/. "$STAGE/$PKGROOT/payload/"
          cp -a packaging/fedora/taskblaster.sh "$STAGE/$PKGROOT/packaging/fedora/"
          cp -a packaging/fedora/taskblaster.desktop "$STAGE/$PKGROOT/packaging/fedora/"
          cp -a packaging/fedora/icons/taskblaster.png "$STAGE/$PKGROOT/packaging/fedora/icons/"
          cp -a LICENSE "$STAGE/$PKGROOT/"

          tar -C "$STAGE" -czf "$RPMTOP/SOURCES/$TARBALL" "$PKGROOT"

      - name: Build RPM
        shell: bash
        run: |
          set -euo pipefail
          RPMTOP="/github/home/rpmbuild"
          rpmbuild -ba "$RPMTOP/SPECS/taskblaster.spec" --define "_topdir ${RPMTOP}"

      - name: Collect RPM
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find /github/home/rpmbuild/RPMS -name "*.rpm" -exec cp {} dist/ \;
          ls -la dist

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-fedora${{ matrix.fedora }}-rpm
          path: dist/*.rpm

  # ==================================================================
  # Debian/Ubuntu .deb (amd64 + arm64 — arm64 covers Raspberry Pi 4/5 on 64-bit OS)
  # ==================================================================
  deb_ubuntu:
    name: Ubuntu/Debian .deb (${{ matrix.deb_arch }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - deb_arch: amd64
            rid: linux-x64
          - deb_arch: arm64
            rid: linux-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install packaging tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dpkg dpkg-dev fakeroot tar gzip

      - name: Restore
        shell: bash
        run: dotnet restore "$PROJECT_PATH"

      - name: Publish ${{ matrix.rid }} self-contained
        shell: bash
        run: |
          set -euo pipefail
          VER="${GITHUB_REF_NAME#v}"; [ "$VER" = "${GITHUB_REF_NAME}" ] && VER="0.0.0-dev"
          dotnet publish "$PROJECT_PATH" \
            -c "$CONFIGURATION" -r "${{ matrix.rid }}" \
            --self-contained true -p:PublishSingleFile=false \
            -p:Version="$VER" -o "out/${{ matrix.rid }}"

      - name: Build .deb
        shell: bash
        run: |
          set -euo pipefail
          VER="${GITHUB_REF_NAME#v}"; [ "$VER" = "${GITHUB_REF_NAME}" ] && VER="0.0.0-dev"
          ARCH="${{ matrix.deb_arch }}"
          RID="${{ matrix.rid }}"
          NAME="$DEB_PKG_NAME"

          ROOT="$(mktemp -d)"
          PKGDIR="$ROOT/${NAME}_${VER}_${ARCH}"

          mkdir -p "$PKGDIR/DEBIAN" \
                   "$PKGDIR/opt/${APP_NAME}" \
                   "$PKGDIR/usr/bin" \
                   "$PKGDIR/usr/share/applications" \
                   "$PKGDIR/usr/share/icons/hicolor/256x256/apps"

          cp -a "out/${RID}/." "$PKGDIR/opt/${APP_NAME}/"
          chmod 0755 "$PKGDIR/opt/${APP_NAME}/${APP_NAME}" || true

          printf '#!/usr/bin/env bash\nset -euo pipefail\nexec /opt/%s/%s "$@"\n' \
            "$APP_NAME" "$APP_NAME" > "$PKGDIR/usr/bin/$NAME"
          chmod 0755 "$PKGDIR/usr/bin/$NAME"

          printf '[Desktop Entry]\nType=Application\nName=TaskBlaster\nComment=.csx script editor and runner\nExec=/usr/bin/%s\nIcon=%s\nTerminal=false\nCategories=Development;IDE;Utility;\n' \
            "$NAME" "$NAME" > "$PKGDIR/usr/share/applications/$NAME.desktop"

          if [ -f packaging/fedora/icons/taskblaster.png ]; then
            cp -a packaging/fedora/icons/taskblaster.png "$PKGDIR/usr/share/icons/hicolor/256x256/apps/$NAME.png"
          fi

          INSTALLED_SIZE="$(du -sk "$PKGDIR/opt/${APP_NAME}" | awk '{print $1}')"

          printf 'Package: %s\nVersion: %s\nSection: devel\nPriority: optional\nArchitecture: %s\nMaintainer: TaskBlaster CI <noreply@github.com>\nInstalled-Size: %s\nDescription: TaskBlaster\n Desktop .csx script editor and runner with GuiBlast-powered forms.\n' \
            "$NAME" "$VER" "$ARCH" "$INSTALLED_SIZE" > "$PKGDIR/DEBIAN/control"

          mkdir -p dist
          fakeroot dpkg-deb --build "$PKGDIR" "dist/${NAME}_${VER}_${ARCH}.deb"
          ls -la dist

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-deb-${{ matrix.deb_arch }}
          path: dist/*.deb

  # ==================================================================
  # Publish GitHub Release with all collected artifacts
  # ==================================================================
  release:
    name: Publish GitHub Release
    needs: [build, rpm_fedora, deb_ubuntu]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find artifacts -maxdepth 8 -type f -exec cp -v "{}" dist/ \;
          ls -la dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*
          generate_release_notes: true
