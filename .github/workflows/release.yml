name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  checks: write

env:
  APP_NAME: TaskBlaster
  CONFIGURATION: Release
  PROJECT_PATH: ./TaskBlaster/TaskBlaster.csproj

jobs:
  test:
    name: Test (gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore TaskBlaster.slnx

      - name: Build
        run: dotnet build TaskBlaster.slnx --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test TaskBlaster.Tests/TaskBlaster.Tests.csproj
          --configuration Release --no-build
          --
          --report-trx
          --results-directory ${{ github.workspace }}/TestResults

      - name: Dump test output on failure
        if: failure()
        shell: bash
        run: |
          echo "=== TestResults directory tree ==="
          find "${GITHUB_WORKSPACE}" -path '*TestResults*' -type f 2>/dev/null | sort
          echo
          echo "=== Contents of every TestResults .log ==="
          for f in $(find "${GITHUB_WORKSPACE}" -path '*TestResults*' -name '*.log' 2>/dev/null); do
            echo "--- $f ---"; cat "$f" || true; echo
          done
          echo "=== Head of every TestResults .trx ==="
          for f in $(find "${GITHUB_WORKSPACE}" -path '*TestResults*' -name '*.trx' 2>/dev/null); do
            echo "--- $f ---"; head -c 4000 "$f" || true; echo
          done

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            TestResults/**/*.trx
            TestResults/**/*.log
            TaskBlaster.Tests/bin/**/TestResults/**/*
          if-no-files-found: warn

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: xUnit Tests
          path: TestResults/**/*.trx
          reporter: dotnet-trx
          fail-on-error: false

  build:
    name: Build (${{ matrix.name }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            rid: win-x64
          - name: linux-x64
            os: ubuntu-latest
            rid: linux-x64
          - name: linux-arm64
            os: ubuntu-latest
            rid: linux-arm64
          - name: macos-x64
            os: macos-latest
            rid: osx-x64
          - name: macos-arm64
            os: macos-latest
            rid: osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        shell: bash
        run: dotnet restore "$PROJECT_PATH"

      - name: Publish
        shell: bash
        run: |
          set -euo pipefail
          VER="${GITHUB_REF_NAME#v}"
          if [ -z "$VER" ] || [ "$VER" = "${GITHUB_REF_NAME}" ]; then
            VER="0.0.0-dev"
          fi
          dotnet publish "$PROJECT_PATH" \
            -c "$CONFIGURATION" \
            -r "${{ matrix.rid }}" \
            --self-contained true \
            -p:PublishSingleFile=false \
            -p:Version="$VER" \
            -o "out/${{ matrix.name }}"

      - name: Package (Windows zip)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path "out\${{ matrix.name }}\*" -DestinationPath "${{ env.APP_NAME }}-${{ matrix.name }}.zip"

      - name: Package (Linux/macOS tar.gz)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          cd "out/${{ matrix.name }}"
          tar -czf "../../${APP_NAME}-${{ matrix.name }}.tar.gz" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.name }}
          path: |
            ${{ env.APP_NAME }}-${{ matrix.name }}.zip
            ${{ env.APP_NAME }}-${{ matrix.name }}.tar.gz
          if-no-files-found: ignore

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/**/*
          generate_release_notes: true
