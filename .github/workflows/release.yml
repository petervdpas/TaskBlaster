name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: TaskBlaster
  CONFIGURATION: Release
  PROJECT_PATH: ./TaskBlaster/TaskBlaster.csproj

jobs:
  build:
    name: Build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            rid: win-x64
          - name: linux-x64
            os: ubuntu-latest
            rid: linux-x64
          - name: linux-arm64
            os: ubuntu-latest
            rid: linux-arm64
          - name: macos-x64
            os: macos-latest
            rid: osx-x64
          - name: macos-arm64
            os: macos-latest
            rid: osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        shell: bash
        run: dotnet restore "$PROJECT_PATH"

      - name: Publish
        shell: bash
        run: |
          set -euo pipefail
          VER="${GITHUB_REF_NAME#v}"
          if [ -z "$VER" ] || [ "$VER" = "${GITHUB_REF_NAME}" ]; then
            VER="0.0.0-dev"
          fi
          dotnet publish "$PROJECT_PATH" \
            -c "$CONFIGURATION" \
            -r "${{ matrix.rid }}" \
            --self-contained true \
            -p:PublishSingleFile=false \
            -p:Version="$VER" \
            -o "out/${{ matrix.name }}"

      - name: Package (Windows zip)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path "out\${{ matrix.name }}\*" -DestinationPath "${{ env.APP_NAME }}-${{ matrix.name }}.zip"

      - name: Package (Linux/macOS tar.gz)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          cd "out/${{ matrix.name }}"
          tar -czf "../../${APP_NAME}-${{ matrix.name }}.tar.gz" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.name }}
          path: |
            ${{ env.APP_NAME }}-${{ matrix.name }}.zip
            ${{ env.APP_NAME }}-${{ matrix.name }}.tar.gz
          if-no-files-found: ignore

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/**/*
          generate_release_notes: true
