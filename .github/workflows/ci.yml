name: ci

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore TaskBlaster.slnx

      - name: Build
        run: dotnet build TaskBlaster.slnx --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test TaskBlaster.Tests/TaskBlaster.Tests.csproj
          --configuration Release --no-build
          --report-trx --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/**/*.trx
          if-no-files-found: warn

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: xUnit Tests
          path: TestResults/**/*.trx
          reporter: dotnet-trx
          fail-on-error: false
