name: ci

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore TaskBlaster.slnx

      - name: Build
        run: dotnet build TaskBlaster.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test TaskBlaster.Tests/TaskBlaster.Tests.csproj --configuration Release --no-build --logger "console;verbosity=normal"
